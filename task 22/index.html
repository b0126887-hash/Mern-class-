<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Social Media Workspace</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page-wrapper">
      <header class="hero">
        <h1>Your social media<br />workspace</h1>
        <p class="tagline">Share consistently without the chaos</p>

        <form class="email-form">
          <input type="email" placeholder="Enter your email..." required />
          <button type="submit">Get started for free &rarr;</button>
        </form>

        <p class="footer-text">
          By entering your email, you agree to receive emails from Buffer.
        </p>
      </header>
    </div>
  </body>
</html>
