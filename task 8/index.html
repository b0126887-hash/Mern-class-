<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="top-left">
            <textarea placeholder="Here you can paste the text"></textarea>
        </div>
        <div class="top-right">
            <label>Here you can add image</label>
            <input type="file" accept="image/*">
        </div>
        <div class="bottom-left">
            <label>Here you can add the input box</label>
            <input type="text" placeholder="Input box">
        </div>
        <div class="bottom-right">
            <textarea placeholder="Gray box for input"></textarea>
        </div>
    </div>
</body>
</html>
